
<html>
<head
    <title>Switch Example</title>
</head>
<body>
    <h1>Switch Example</h1>
</body>

<script>

    // 
    var month = 13; // datatype : number
    // == , ===
    var food = "apple";
    // 

    switch(food) {
            case "apple":
            case "banana":
            case "mango":
            case "orange":
                console.log("fruit");
                break;
            case "carrot":
            case "potato":
                console.log("vegetable");
                break;
            default:
                console.log("Invalid food");
                break;

    }


    switch (month) { // switch( expression ) {
       
      case 12:
      case 13: 
      case 14: 
            console.log("December 2");
            break;
        default: // no case matched
            console.log("Invalid month");
        case 1:                         // if(){}
            console.log("January");
            //break;
        case 12:
            console.log("December 1");
            //break;
        case 3:
            console.log("March");
            break;
        case 2:
            console.log("February");
            break;
        case 4:
            console.log("April");
            break;
        case 5:
            console.log("May");
            break;
        case 6:
            console.log("June");
            break;
        case 7:
            console.log("July");
            break;
        case 8:
            console.log("August");
            break;
        case 9:
            console.log("September");
            break;
        case 10:
            console.log("October");
            break;
        case 11:
            console.log("November");
            break;
        
        
    }




</script>


</html>
