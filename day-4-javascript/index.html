<html>
<head>
    <title>DOM</title>
</head>
<body>
        <h1 id="h1_1" class="h1_1"> Hello Friend 1 </h1>
        <h1 id="h1_2" class="h1_1" > Hello Friend 2 </h1>
        <H1 id="h1_3" class="h1_1"> Hello Friend 3 </H1>
        <h1 id="h1_4" class="h1_1"> Hello Friend 4 </h1>
        <br>
        <div>
                <p id="p_1"> Hello Friend </p>
        </div>

        <div>
              <input type="button" value="Change Style" onclick="handleChangeStyle()">
        </div>

        <input type="button" value="test" onclick="handleButtonClick()"> change

        <a href="about.html"> About </a>
        <div>
                <ol id="ol_fruits">
                    <li class="li_fruit">Apple</li>
                    <li class="li_fruit">Mango</li>
                    <li class="li_fruit">Orange</li>
                </ol>
        </div>
        <div>
                <input type="text" id="student_name" placeholder="student name" />
                <br>
                <br>
                Male<input type="radio" name="gender" value="male"/>
                Female<input type="radio" name="gender" value="female"/>
                <div>
                        <input type="button" value="Save" onclick="handleSaveClick()">
                </div>
        </div>
        <br>
        <div>
            Entered Student Name : <div id="form_student_name"> ? </div>
        </div>

        <div>
                <p class="message">Hello</p>
                <p class="message">World</p>
        </div>

</body>
<script>

    //document.getElementById("h1_2").innerHTML = "updated h1_2"
    // 
    function handleButtonClick()
    {
        //document.getElementById("h1_1").textContent = "updated h1_1";
        console.log('getElementById ', document.getElementById("h1_1"));
        console.log('getElementsByClassName ', document.getElementsByClassName("h1_1"));
        document.getElementsByClassName("h1_1")[3].textContent = "all changed";
        for(let i = 0; i < document.getElementsByClassName("h1_1").length; i++)
        {
            document.getElementsByClassName("h1_1")[i].textContent = "all changed";   
        }
        console.log('getElementById ol_fruits ', document.getElementById("ol_fruits"));
        
        console.log('getElementsByTagName', document.getElementsByTagName("li"));
        document.getElementsByTagName("li")[0].innerText = "APPLE";

        document.getElementsByClassName("li_fruit")[2].innerText = "ORANGE";

        console.log(document.querySelector(".message"));

        console.log(document.querySelectorAll(".message"));
    }

    function handleSaveClick()
        {
           let studentName = document.getElementById("student_name").value; 
           console.log('studentName ',studentName);
           document.getElementById("form_student_name").textContent = studentName; 

           const selectedRadio = document.querySelector('input[name="gender"]:checked');
    
            if (selectedRadio) {
                console.log(selectedRadio.value);
            } else {
                console.log("No radio button is selected");
            }

        }

        function handleChangeStyle()
        {

            document.getElementById("p_1").style.color = "red";

            


        }

</script>

</html>
